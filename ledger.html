<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#0A0A10;color:#F0EDE8;min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
#auth{background:#0A0A10;display:flex;align-items:center;justify-content:center;padding:30px 20px}
#auth.active{display:flex}
.auth-box{background:#16161E;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px 28px;width:100%;max-width:380px}
.logo{font-size:28px;font-weight:800;color:#F0EDE8;margin-bottom:4px}
.logo span{color:#C8A97E}
.tagline{font-size:11px;color:#666;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px}
.tabs{display:flex;background:#0F0F17;border-radius:10px;padding:3px;margin-bottom:22px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;color:#666;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;-webkit-appearance:none}
.tab.active{background:#1E1E2A;color:#F0EDE8}
.lbl{font-size:10px;color:#666;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.inp{width:100%;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px 14px;color:#F0EDE8;font-size:16px;font-family:inherit;outline:none;margin-bottom:14px;-webkit-appearance:none;display:block}
.inp:focus{border-color:#C8A97E}
.btn-main{width:100%;padding:14px;background:#C8A97E;color:#0A0A10;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;-webkit-appearance:none;display:block;margin-top:4px}
.err{color:#E07070;font-size:12px;text-align:center;margin-top:10px;min-height:18px}
#app-screen{background:#0A0A10}
#app-screen.active{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#13131B;border-bottom:1px solid rgba(255,255,255,0.07);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-logo{font-size:18px;font-weight:800;color:#F0EDE8}
.topbar-logo span{color:#C8A97E}
.topbar-user{font-size:12px;color:#666}
.btn-out{padding:7px 12px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#666;font-size:11px;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.botnav{background:#13131B;border-top:1px solid rgba(255,255,255,0.07);display:flex;position:sticky;bottom:0;z-index:10}
.botnav-item{flex:1;padding:12px 4px 10px;text-align:center;cursor:pointer;border:none;background:none;color:#555;font-family:inherit;-webkit-appearance:none}
.botnav-item .nav-ico{font-size:20px;display:block;margin-bottom:3px}
.botnav-item .nav-lbl{font-size:10px;display:block}
.botnav-item.active{color:#C8A97E}
.content{flex:1;padding:20px 16px;overflow-y:auto}
.card{background:#16161E;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:#16161E;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px}
.stat-box.full{grid-column:1/-1}
.stat-lbl{font-size:10px;color:#555;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:800;color:#F0EDE8}
.stat-val.gold{color:#C8A97E}
.stat-sub{font-size:11px;color:#555;margin-top:3px}
.warn{background:rgba(224,112,112,0.1);border:1px solid rgba(224,112,112,0.25);border-radius:10px;padding:12px 14px;font-size:12px;color:#E07070;margin-bottom:14px}
.gmail-card{background:#16161E;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px;margin-bottom:14px}
.gmail-row{display:flex;align-items:flex-start;gap:12px}
.gmail-ico{font-size:22px}
.gmail-ttl{font-size:13px;font-weight:600;color:#F0EDE8;margin-bottom:3px}
.gmail-sub{font-size:11px;color:#555;line-height:1.5}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-sm{padding:8px 14px;background:#0F0F17;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#999;font-size:12px;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.gmail-input{width:100%;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;color:#F0EDE8;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:80px;margin-top:10px;display:none}
.gmail-input:focus{border-color:#C8A97E}
.btn-parse{padding:9px 16px;background:#C8A97E;color:#0A0A10;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;display:none;-webkit-appearance:none}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-ttl{font-size:11px;color:#555;letter-spacing:0.08em;text-transform:uppercase}
.btn-add{padding:9px 16px;background:#C8A97E;color:#0A0A10;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.tx-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#1A1A24;border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:8px}
.tx-ico{width:36px;height:36px;background:#0F0F17;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:13px;font-weight:500;color:#F0EDE8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:10px;color:#555;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tx-amt{font-size:14px;font-weight:700;color:#E07070;white-space:nowrap}
.tx-actions{display:flex;gap:5px}
.ico-btn{width:28px;height:28px;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#555;font-size:12px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.bdg{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;letter-spacing:0.06em;text-transform:uppercase}
.bdg-m{background:rgba(200,169,126,0.15);color:#C8A97E}
.bdg-s{background:rgba(114,196,168,0.15);color:#72C4A8}
.bdg-c{background:rgba(255,255,255,0.06);color:#555}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-inp{flex:1;min-width:140px;background:#16161E;border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;color:#F0EDE8;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:#C8A97E}
.filter-sel{background:#16161E;border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;color:#F0EDE8;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none;cursor:pointer}
.filter-sel:focus{border-color:#C8A97E}
.btn-export{padding:9px 14px;background:#16161E;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#666;font-size:12px;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.month-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.m-pill{padding:6px 13px;background:#16161E;border:1px solid rgba(255,255,255,0.08);border-radius:20px;font-size:11px;color:#555;cursor:pointer;white-space:nowrap;-webkit-appearance:none;font-family:inherit}
.m-pill.active{border-color:#C8A97E;color:#C8A97E;background:rgba(200,169,126,0.08)}
.chart-wrap{position:relative;height:220px;margin-top:8px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cat-item{background:#1A1A24;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:space-between}
.cat-nm{font-size:12px;color:#F0EDE8}
.cat-del{width:24px;height:24px;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#555;font-size:11px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.add-row{display:flex;gap:8px}
.add-inp{flex:1;background:#1A1A24;border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:11px 12px;color:#F0EDE8;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.add-inp:focus{border-color:#C8A97E}
.btn-cat-add{padding:11px 16px;background:#C8A97E;color:#0A0A10;border:none;border-radius:9px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.empty{text-align:center;padding:40px 20px;color:#444}
.empty-ico{font-size:28px;margin-bottom:10px}
#modal-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
#modal-wrap.open{display:block}
.modal-inner{min-height:100%;display:flex;align-items:flex-end;justify-content:center;padding:20px}
.modal-box{background:#16161E;border:1px solid rgba(255,255,255,0.1);border-radius:20px 20px 14px 14px;padding:26px 22px;width:100%;max-width:440px;margin-top:auto}
.modal-ttl{font-size:18px;font-weight:800;color:#F0EDE8;margin-bottom:20px}
.m-inp{width:100%;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 13px;color:#F0EDE8;font-size:16px;font-family:inherit;outline:none;margin-bottom:12px;-webkit-appearance:none;display:block}
.m-inp:focus{border-color:#C8A97E}
.m-sel{width:100%;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 13px;color:#F0EDE8;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;-webkit-appearance:none;cursor:pointer;display:block}
.m-sel:focus{border-color:#C8A97E}
.m-ta{width:100%;background:#0F0F17;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 13px;color:#F0EDE8;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:70px;margin-bottom:12px;-webkit-appearance:none;display:block}
.m-ta:focus{border-color:#C8A97E}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:9px;margin-top:6px}
.btn-cancel{flex:1;padding:13px;background:#0F0F17;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#666;font-size:14px;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.btn-save{flex:1;padding:13px;background:#C8A97E;border:none;border-radius:10px;color:#0A0A10;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;-webkit-appearance:none}
</style>
</head>
<body>
<div id="auth" class="screen active">
  <div class="auth-box">
    <div class="logo">Ledger<span>.</span></div>
    <div class="tagline">Bank Transaction Tracker</div>
    <div class="tabs">
      <button class="tab active" id="tab-in" type="button">Sign In</button>
      <button class="tab" id="tab-up" type="button">Sign Up</button>
    </div>
    <div id="f-name-wrap" style="display:none">
      <span class="lbl">Full Name</span>
      <input class="inp" type="text" id="f-name" placeholder="Your name" autocomplete="name"/>
    </div>
    <span class="lbl">Email</span>
    <input class="inp" type="email" id="f-email" placeholder="you@email.com" autocomplete="email"/>
    <span class="lbl">Password</span>
    <input class="inp" type="password" id="f-pass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-main" id="auth-btn" type="button">Sign In</button>
    <div class="err" id="auth-err"></div>
  </div>
</div>
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="topbar-logo">Ledger<span>.</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="topbar-user" id="topbar-name"></div>
      <button class="btn-out" id="signout-btn" type="button">Sign Out</button>
    </div>
  </div>
  <div class="content" id="page-content"></div>
  <div class="botnav">
    <button class="botnav-item active" type="button" data-page="dashboard"><span class="nav-ico">⬡</span><span class="nav-lbl">Dashboard</span></button>
    <button class="botnav-item" type="button" data-page="transactions"><span class="nav-ico">↕</span><span class="nav-lbl">Transactions</span></button>
    <button class="botnav-item" type="button" data-page="analytics"><span class="nav-ico">◎</span><span class="nav-lbl">Analytics</span></button>
    <button class="botnav-item" type="button" data-page="categories"><span class="nav-ico">❖</span><span class="nav-lbl">Categories</span></button>
  </div>
</div>
<div id="modal-wrap">
  <div class="modal-inner">
    <div class="modal-box">
      <div class="modal-ttl" id="modal-ttl">Add Transaction</div>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn-cancel" id="modal-cancel" type="button">Cancel</button>
        <button class="btn-save" id="modal-save" type="button">Save</button>
      </div>
    </div>
  </div>
</div>
<script>
const CATS_DEFAULT=['Food','Transport','Bills','Shopping','Other'];
const CAT_ICO={Food:'🍜',Transport:'🚗',Bills:'⚡',Shopping:'🛍️',Other:'📌'};
const BANKS=['Meezan','Sadapay'];
const CHART_COLORS=['#C8A97E','#72C4A8','#C87E9A','#7E9AC8','#A8C87E','#C8C07E'];
let user=null,txns=[],cats=[...CATS_DEFAULT],bals={Meezan:0,Sadapay:0};
let page='dashboard',selMonth=mKey(new Date()),modalMode=null,editId=null,charts={},gmailOpen=false;
function mKey(d){const dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')}
function mLabel(k){const[y,m]=k.split('-');return new Date(y,m-1).toLocaleDateString('en',{month:'short',year:'numeric'})}
function fmtAmt(n){return'Rs. '+Number(n||0).toLocaleString()}
function fmtDate(d){return new Date(d).toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'})}
function cIco(c){return CAT_ICO[c]||'📌'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function persist(){localStorage.setItem('lg_tx',JSON.stringify(txns));localStorage.setItem('lg_cat',JSON.stringify(cats));localStorage.setItem('lg_bal',JSON.stringify(bals))}
function hydrate(){txns=JSON.parse(localStorage.getItem('lg_tx')||'[]');cats=JSON.parse(localStorage.getItem('lg_cat')||JSON.stringify(CATS_DEFAULT));bals=JSON.parse(localStorage.getItem('lg_bal')||'{"Meezan":0,"Sadapay":0}')}
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch{}});charts={}}
let authMode='in';
function setAuthMode(m){authMode=m;document.getElementById('tab-in').classList.toggle('active',m==='in');document.getElementById('tab-up').classList.toggle('active',m==='up');document.getElementById('f-name-wrap').style.display=m==='up'?'block':'none';document.getElementById('auth-btn').textContent=m==='in'?'Sign In':'Create Account';document.getElementById('auth-err').textContent=''}
function doAuth(){
  const email=document.getElementById('f-email').value.trim(),pass=document.getElementById('f-pass').value,name=document.getElementById('f-name').value.trim(),errEl=document.getElementById('auth-err');
  if(!email||!pass){errEl.textContent='Please fill all fields.';return}
  const accounts=JSON.parse(localStorage.getItem('lg_acc')||'{}');
  if(authMode==='up'){if(!name){errEl.textContent='Name is required.';return}if(accounts[email]){errEl.textContent='Account already exists.';return}accounts[email]={name,pass};localStorage.setItem('lg_acc',JSON.stringify(accounts));user={name,email}}
  else{const acc=accounts[email];if(!acc||acc.pass!==pass){errEl.textContent='Invalid email or password.';return}user={name:acc.name,email}}
  localStorage.setItem('lg_user',JSON.stringify(user));hydrate();launchApp()
}
function launchApp(){document.getElementById('auth').classList.remove('active');document.getElementById('app-screen').classList.add('active');document.getElementById('topbar-name').textContent=user.name;selMonth=mKey(new Date());renderPage()}
function signOut(){user=null;localStorage.removeItem('lg_user');document.getElementById('app-screen').classList.remove('active');document.getElementById('auth').classList.add('active');document.getElementById('f-email').value='';document.getElementById('f-pass').value='';document.getElementById('auth-err').textContent=''}
function renderPage(){const el=document.getElementById('page-content');if(page==='dashboard')el.innerHTML=renderDashboard();else if(page==='transactions')el.innerHTML=renderTransactions();else if(page==='analytics')el.innerHTML=renderAnalytics();else if(page==='categories')el.innerHTML=renderCategories();bindPageEvents();if(page==='analytics')initCharts()}
function renderDashboard(){const mt=txns.filter(t=>mKey(t.date)===selMonth),total=mt.reduce((s,t)=>s+t.amount,0);return`${bals.Sadapay<5000?`<div class="warn">⚠️ Sadapay balance low — ${fmtAmt(bals.Sadapay)}</div>`:''}<div class="stat-grid"><div class="stat-box" data-action="open-bal" style="cursor:pointer"><div class="stat-lbl">Meezan</div><div class="stat-val gold">${fmtAmt(bals.Meezan)}</div><div class="stat-sub">Tap to update</div></div><div class="stat-box" data-action="open-bal" style="cursor:pointer"><div class="stat-lbl">Sadapay</div><div class="stat-val">${fmtAmt(bals.Sadapay)}</div><div class="stat-sub">Tap to update</div></div><div class="stat-box full"><div class="stat-lbl">Spent This Month</div><div class="stat-val">${fmtAmt(total)}</div><div class="stat-sub">${mt.length} transactions</div></div></div><div class="gmail-card"><div class="gmail-row"><div class="gmail-ico">📧</div><div style="flex:1"><div class="gmail-ttl">Meezan Email Parser</div><div class="gmail-sub">Paste your Meezan alert email to auto-fill a transaction</div><div class="btn-row"><button class="btn-sm" type="button" data-action="toggle-gmail">Paste Email</button><button class="btn-sm" type="button" data-action="open-add">+ Manual Entry</button></div><textarea class="gmail-input" id="gmail-txt" placeholder="Paste Meezan email text here..."></textarea><button class="btn-parse" type="button" id="parse-btn">Parse & Fill →</button></div></div></div><div class="sec-hdr"><div class="sec-ttl">Recent Transactions</div><button class="btn-add" type="button" data-action="open-add">+ Add</button></div>${txns.slice(0,8).length===0?`<div class="empty"><div class="empty-ico">💳</div>No transactions yet</div>`:txns.slice(0,8).map(t=>txRow(t)).join('')}`}
function renderTransactions(){const q=(window._q||'').toLowerCase(),fb=window._fb||'All',fc=window._fc||'All',list=txns.filter(t=>t.description.toLowerCase().includes(q)&&(fb==='All'||t.bank===fb)&&(fc==='All'||t.category===fc));return`<div class="sec-hdr"><button class="btn-export" type="button" data-action="export">📥 Export CSV</button><button class="btn-add" type="button" data-action="open-add">+ Add</button></div><div class="filter-row"><input class="search-inp" type="search" placeholder="🔍 Search..." value="${window._q||''}" id="search-inp"/><select class="filter-sel" id="bank-sel"><option ${fb==='All'?'selected':''}>All</option>${BANKS.map(b=>`<option ${fb===b?'selected':''}>${b}</option>`).join('')}</select><select class="filter-sel" id="cat-sel"><option ${fc==='All'?'selected':''}>All</option>${cats.map(c=>`<option ${fc===c?'selected':''}>${c}</option>`).join('')}</select></div>${list.length===0?`<div class="empty"><div class="empty-ico">🔎</div>No transactions found</div>`:list.map(t=>txRow(t)).join('')}`}
function txRow(t){return`<div class="tx-item"><div class="tx-ico">${cIco(t.category)}</div><div class="tx-info"><div class="tx-desc">${t.description}</div><div class="tx-meta"><span>${fmtDate(t.date)}</span><span class="bdg ${t.bank==='Meezan'?'bdg-m':'bdg-s'}">${t.bank}</span><span class="bdg bdg-c">${t.category}</span></div></div><div class="tx-amt">−${fmtAmt(t.amount)}</div><div class="tx-actions"><button class="ico-btn" type="button" data-action="edit" data-id="${t.id}">✏️</button><button class="ico-btn" type="button" data-action="delete" data-id="${t.id}">🗑</button></div></div>`}
function renderAnalytics(){const months=getMonths(),mt=txns.filter(t=>mKey(t.date)===selMonth),total=mt.reduce((s,t)=>s+t.amount,0),catMap={};mt.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0],bankSplit=BANKS.map(b=>{const bt=mt.filter(t=>t.bank===b),tot=bt.reduce((s,t)=>s+t.amount,0);return`<div class="card"><div class="card-title">${b}</div><div style="font-size:20px;font-weight:800;color:#F0EDE8;margin-bottom:10px">${fmtAmt(tot)}</div>${bt.length===0?`<div style="color:#444;font-size:12px;text-align:center;padding:10px 0">No transactions</div>`:bt.slice(0,4).map(t=>txRow(t)).join('')}</div>`}).join('');return`<div class="month-row">${months.map(m=>`<button class="m-pill ${m===selMonth?'active':''}" type="button" data-action="month" data-m="${m}">${mLabel(m)}</button>`).join('')}</div><div class="stat-grid"><div class="stat-box"><div class="stat-lbl">Total Spent</div><div class="stat-val gold">${fmtAmt(total)}</div><div class="stat-sub">${mt.length} transactions</div></div><div class="stat-box"><div class="stat-lbl">Top Category</div><div class="stat-val" style="font-size:16px">${topCat?topCat[0]:'—'}</div><div class="stat-sub">${topCat?fmtAmt(topCat[1]):'No data'}</div></div></div>${mt.length===0?`<div class="empty card"><div class="empty-ico">📊</div>No data for this month</div>`:`<div class="charts-grid"><div class="card"><div class="card-title">By Category</div><div class="chart-wrap"><canvas id="chart-cat"></canvas></div></div><div class="card"><div class="card-title">By Bank</div><div class="chart-wrap"><canvas id="chart-bank"></canvas></div></div></div>`}${bankSplit}`}
function getMonths(){const keys=[...new Set(txns.map(t=>mKey(t.date)))].sort().reverse(),cur=mKey(new Date());if(!keys.includes(cur))keys.unshift(cur);return keys}
function initCharts(){const mt=txns.filter(t=>mKey(t.date)===selMonth);if(!mt.length)return;const catMap={};mt.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});const c1=document.getElementById('chart-cat');if(c1)charts.cat=new Chart(c1,{type:'doughnut',data:{labels:Object.keys(catMap),datasets:[{data:Object.values(catMap),backgroundColor:CHART_COLORS,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{labels:{color:'#666',font:{size:10}}},tooltip:{callbacks:{label:ctx=>' '+fmtAmt(ctx.parsed)},backgroundColor:'#16161E',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}}}});const c2=document.getElementById('chart-bank');if(c2)charts.bank=new Chart(c2,{type:'bar',data:{labels:BANKS,datasets:[{data:BANKS.map(b=>mt.filter(t=>t.bank===b).reduce((s,t)=>s+t.amount,0)),backgroundColor:['#C8A97E','#72C4A8'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',font:{size:10},callback:v=>v>=1000?(v/1000)+'k':v}}},planets:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmtAmt(ctx.parsed.y)},backgroundColor:'#16161E',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}}}})}
function renderCategories(){return`<div class="card-title">Manage Categories</div><div class="cat-grid">${cats.map(c=>`<div class="cat-item"><div style="display:flex;align-items:center;gap:8px"><span>${cIco(c)}</span><span class="cat-nm">${c}</span></div>${CATS_DEFAULT.includes(c)?'':`<button class="cat-del" type="button" data-action="del-cat" data-cat="${c}">✕</button>`}</div>`).join('')}</div><div class="add-row"><input class="add-inp" type="text" id="new-cat" placeholder="New category..."/><button class="btn-cat-add" type="button" data-action="add-cat">Add</button></div>`}
function bindPageEvents(){const el=document.getElementById('page-content');el.onclick=handleClick;el.onchange=handleChange;el.oninput=handleInput}
function handleClick(e){const btn=e.target.closest('[data-action]');if(!btn)return;const a=btn.dataset.action;if(a==='open-add')openAddModal();if(a==='open-bal')openBalModal();if(a==='toggle-gmail')toggleGmail();if(a==='export')exportCSV();if(a==='edit')openEditModal(btn.dataset.id);if(a==='delete')deleteTx(btn.dataset.id);if(a==='month'){selMonth=btn.dataset.m;killCharts();renderPage()}if(a==='del-cat'){cats=cats.filter(c=>c!==btn.dataset.cat);persist();renderPage()}if(a==='add-cat')addCat();if(btn.id==='parse-btn')parseGmail()}
function handleChange(e){if(e.target.id==='bank-sel'){window._fb=e.target.value;renderPage()}if(e.target.id==='cat-sel'){window._fc=e.target.value;renderPage()}}
function handleInput(e){if(e.target.id==='search-inp'){window._q=e.target.value;renderPage()}}
function toggleGmail(){gmailOpen=!gmailOpen;const ta=document.getElementById('gmail-txt'),pb=document.getElementById('parse-btn');if(ta)ta.style.display=gmailOpen?'block':'none';if(pb)pb.style.display=gmailOpen?'block':'none'}
function parseGmail(){const raw=document.getElementById('gmail-txt')?.value||'',amtMatch=raw.match(/(?:Rs\.?|PKR)\s*([\d,]+)/i),descMatch=raw.match(/(?:at|to|for)\s+([A-Za-z0-9 &'-]+?)(?:\s+on|\s+from|\.|,|\n|$)/i),amt=amtMatch?parseFloat(amtMatch[1].replace(/,/g,'')):null;if(amt){openAddModal({amount:amt,description:descMatch?descMatch[1].trim():'Meezan Transaction',bank:'Meezan',category:'Other'});gmailOpen=false}else alert('Could not find an amount. Please add manually.')}
function addCat(){const v=document.getElementById('new-cat')?.value.trim();if(v&&!cats.includes(v)){cats.push(v);persist();renderPage()}}
function openAddModal(pre={}){modalMode='add';editId=null;document.getElementById('modal-ttl').textContent='Add Transaction';document.getElementById('modal-save').textContent='Add';document.getElementById('modal-body').innerHTML=txForm(pre);document.getElementById('modal-wrap').classList.add('open')}
function openEditModal(id){const t=txns.find(x=>x.id===id);if(!t)return;modalMode='edit';editId=id;document.getElementById('modal-ttl').textContent='Edit Transaction';document.getElementById('modal-save').textContent='Save';document.getElementById('modal-body').innerHTML=txForm(t);document.getElementById('modal-wrap').classList.add('open')}
function openBalModal(){modalMode='bal';document.getElementById('modal-ttl').textContent='Update Balances';document.getElementById('modal-save').textContent='Save';document.getElementById('modal-body').innerHTML=BANKS.map(b=>`<div style="margin-bottom:12px"><span class="lbl">${b} Balance (Rs.)</span><input class="m-inp" type="number" id="bal-${b}" value="${bals[b]||0}"/></div>`).join('');document.getElementById('modal-wrap').classList.add('open')}
function txForm(pre={}){const today=new Date().toISOString().slice(0,10);return`<input class="m-inp" type="text" id="m-desc" placeholder="Description" value="${pre.description||''}"/><div class="m-grid"><input class="m-inp" type="number" id="m-amt" placeholder="Amount (Rs.)" value="${pre.amount||''}"/><input class="m-inp" type="date" id="m-date" value="${pre.date?pre.date.slice(0,10):today}"/></div><div class="m-grid"><select class="m-sel" id="m-bank">${BANKS.map(b=>`<option ${(pre.bank||'Meezan')===b?'selected':''}>${b}</option>`).join('')}</select><select class="m-sel" id="m-cat">${cats.map(c=>`<option ${(pre.category||cats[0])===c?'selected':''}>${c}</option>`).join('')}</select></div><textarea class="m-ta" id="m-notes" placeholder="Notes (optional)">${pre.notes||''}</textarea>`}
function closeModal(){document.getElementById('modal-wrap').classList.remove('open');modalMode=null;editId=null}
function saveModal(){if(modalMode==='bal'){BANKS.forEach(b=>{bals[b]=parseFloat(document.getElementById('bal-'+b)?.value)||0});persist();closeModal();renderPage();return}const desc=document.getElementById('m-desc')?.value.trim(),amt=parseFloat(document.getElementById('m-amt')?.value),date=document.getElementById('m-date')?.value,bank=document.getElementById('m-bank')?.value,cat=document.getElementById('m-cat')?.value,notes=document.getElementById('m-notes')?.value.trim();if(!desc||!amt)return;if(modalMode==='add'){txns.unshift({id:uid(),description:desc,amount:amt,date:new Date(date).toISOString(),bank,category:cat,notes});bals[bank]=Math.max(0,(bals[bank]||0)-amt)}else if(modalMode==='edit'){const i=txns.findIndex(t=>t.id===editId);if(i>-1)txns[i]={...txns[i],description:desc,amount:amt,date:new Date(date).toISOString(),bank,category:cat,notes}}persist();closeModal();renderPage()}
function deleteTx(id){const t=txns.find(x=>x.id===id);if(t)bals[t.bank]=(bals[t.bank]||0)+t.amount;txns=txns.filter(x=>x.id!==id);persist();renderPage()}
function exportCSV(){const rows=[['Date','Description','Amount','Category','Bank','Notes'],...txns.map(t=>[fmtDate(t.date),t.description,t.amount,t.category,t.bank,t.notes||''])],csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='ledger.csv';a.click()}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('tab-in').addEventListener('click',()=>setAuthMode('in'));
  document.getElementById('tab-up').addEventListener('click',()=>setAuthMode('up'));
  document.getElementById('auth-btn').addEventListener('click',doAuth);
  document.getElementById('signout-btn').addEventListener('click',signOut);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);
  document.getElementById('modal-save').addEventListener('click',saveModal);
  document.getElementById('modal-wrap').addEventListener('click',e=>{if(e.target===document.getElementById('modal-wrap'))closeModal()});
  document.querySelectorAll('.botnav-item').forEach(btn=>{btn.addEventListener('click',()=>{page=btn.dataset.page;document.querySelectorAll('.botnav-item').forEach(b=>b.classList.remove('active'));btn.classList.add('active');killCharts();renderPage()})});
  const saved=localStorage.getItem('lg_user');
  if(saved){user=JSON.parse(saved);hydrate();launchApp()}
});
</script>
</body>
</html>
