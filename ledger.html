<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ledger — Bank Transaction Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090F;--surface:#111119;--s2:#17171F;--s3:#1D1D27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F0EDE8;--muted:#7A7888;--muted2:#5A5868;
  --gold:#C8A97E;--teal:#72C4A8;--red:#D97070;--green:#72C4A8;
  --fd:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fm)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* ── GLOW ORBS ── */
body::before{content:'';position:fixed;top:-250px;left:-150px;width:700px;height:700px;
  background:radial-gradient(circle,rgba(200,169,126,.055) 0%,transparent 65%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-200px;right:-100px;width:550px;height:550px;
  background:radial-gradient(circle,rgba(114,196,168,.04) 0%,transparent 65%);pointer-events:none;z-index:0}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:24px;z-index:50;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:44px 38px;width:100%;max-width:400px;box-shadow:0 48px 96px rgba(0,0,0,.7)}
.auth-wordmark{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:2px}
.auth-wordmark span{color:var(--gold)}
.auth-tagline{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:32px}
.tab-row{display:flex;background:var(--s2);border-radius:10px;padding:4px;gap:0;margin-bottom:26px}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);
  font-family:var(--fm);font-size:12px;cursor:pointer;border-radius:7px;transition:.2s}
.tab-btn.on{background:var(--s3);color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;color:var(--text);font-family:var(--fm);font-size:13px;outline:none;transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:65px}
.field select{appearance:none;cursor:pointer}
.btn-gold{width:100%;padding:13px;background:var(--gold);color:#09090F;border:none;border-radius:10px;
  font-family:var(--fd);font-weight:800;font-size:14px;letter-spacing:.04em;cursor:pointer;
  transition:.18s;margin-top:6px}
.btn-gold:hover{opacity:.88;transform:translateY(-1px)}
.auth-err{color:var(--red);font-size:11px;text-align:center;margin-top:10px;min-height:16px}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;position:relative;z-index:1}
.shell{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:0;position:fixed;top:0;left:0;bottom:0;z-index:20}
.sb-logo{font-family:var(--fd);font-size:19px;font-weight:800;letter-spacing:-.5px;
  padding:26px 22px 22px;border-bottom:1px solid var(--border)}
.sb-logo span{color:var(--gold)}
.sb-user{padding:18px 22px;border-bottom:1px solid var(--border)}
.sb-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.sb-nav{padding:10px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 22px;color:var(--muted);
  font-size:12px;cursor:pointer;border-left:2px solid transparent;transition:.15s;letter-spacing:.02em}
.nav-item:hover{color:var(--text);background:var(--s2)}
.nav-item.on{color:var(--gold);border-left-color:var(--gold);background:rgba(200,169,126,.07)}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sb-foot{padding:16px}
.btn-signout{width:100%;padding:9px;background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-family:var(--fm);font-size:11px;cursor:pointer;transition:.2s}
.btn-signout:hover{border-color:var(--red);color:var(--red)}

/* ── MAIN ── */
.main{margin-left:230px;flex:1;padding:36px 38px;min-height:100vh}
.pg-title{font-family:var(--fd);font-size:24px;font-weight:800;letter-spacing:-.5px;
  margin-bottom:26px;color:var(--text)}
.pg-title span{color:var(--gold)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:22px}
.card-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 20px}
.stat-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.stat-val{font-family:var(--fd);font-size:23px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.stat-val.gold{color:var(--gold)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:.06em;text-transform:uppercase}
.bdg-meezan{background:rgba(200,169,126,.13);color:var(--gold)}
.bdg-sadapay{background:rgba(114,196,168,.13);color:var(--teal)}
.bdg-cat{background:rgba(255,255,255,.06);color:var(--muted)}

/* ── WARNING ── */
.warn-bar{display:flex;align-items:center;gap:12px;padding:13px 16px;
  background:rgba(217,112,112,.09);border:1px solid rgba(217,112,112,.22);
  border-radius:11px;margin-bottom:18px;font-size:12px;color:var(--red)}

/* ── GMAIL PANEL ── */
.gmail-panel{display:flex;align-items:flex-start;gap:14px;padding:18px;
  background:var(--s2);border:1px solid var(--border);border-radius:13px;margin-bottom:18px}
.gmail-icon{font-size:24px;margin-top:2px}
.gmail-body{flex:1}
.gmail-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.gmail-sub{font-size:11px;color:var(--muted);line-height:1.5}
.gmail-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-sm{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;
  color:var(--muted);font-family:var(--fm);font-size:11px;cursor:pointer;transition:.18s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm.teal:hover{border-color:var(--teal);color:var(--teal)}
#gmail-area{margin-top:10px;display:none}
#gmail-area textarea{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none;
  resize:vertical;min-height:80px}
#gmail-area textarea:focus{border-color:var(--gold)}

/* ── TX LIST ── */
.tx-list{display:flex;flex-direction:column;gap:7px}
.tx-item{display:flex;align-items:center;gap:12px;padding:13px 15px;
  background:var(--s2);border:1px solid var(--border);border-radius:12px;transition:.15s}
.tx-item:hover{border-color:var(--border2)}
.tx-ico{width:36px;height:36px;border-radius:9px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tx-amt{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--red);white-space:nowrap}
.tx-btns{display:flex;gap:5px}
.ico-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:transparent;
  color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.ico-btn:hover{border-color:var(--gold);color:var(--gold)}
.ico-btn.del:hover{border-color:var(--red);color:var(--red)}

/* ── FILTER BAR ── */
.fbar{display:flex;gap:9px;margin-bottom:17px;flex-wrap:wrap}
.fbar input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none}
.fbar input:focus{border-color:var(--gold)}
.fbar select{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:9px 12px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none;
  cursor:pointer;appearance:none;min-width:120px}
.fbar select:focus{border-color:var(--gold)}

/* ── TOP ROW ── */
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.btn-add{padding:9px 16px;background:var(--gold);border:none;border-radius:9px;color:#09090F;
  font-family:var(--fd);font-weight:700;font-size:13px;cursor:pointer;transition:.18s}
.btn-add:hover{opacity:.88}
.btn-export{padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:9px;
  color:var(--muted);font-family:var(--fm);font-size:11px;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:6px}
.btn-export:hover{border-color:var(--teal);color:var(--teal)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:30px;width:100%;max-width:460px;box-shadow:0 48px 96px rgba(0,0,0,.7);
  max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--fd);font-size:19px;font-weight:800;margin-bottom:22px}
.mfooter{display:flex;gap:9px;margin-top:22px}
.btn-cancel{flex:1;padding:11px;background:transparent;border:1px solid var(--border);
  border-radius:9px;color:var(--muted);font-family:var(--fm);font-size:12px;cursor:pointer;transition:.2s}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-save{flex:1;padding:11px;background:var(--gold);border:none;border-radius:9px;color:#09090F;
  font-family:var(--fd);font-weight:700;font-size:13px;cursor:pointer;transition:.18s}
.btn-save:hover{opacity:.88}

/* ── CHARTS ── */
.charts-g{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.month-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.m-btn{padding:6px 13px;border:1px solid var(--border);border-radius:7px;background:transparent;
  color:var(--muted);font-family:var(--fm);font-size:10px;cursor:pointer;transition:.15s;letter-spacing:.04em}
.m-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,169,126,.08)}

/* ── CATEGORIES ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.cat-card{background:var(--s2);border:1px solid var(--border);border-radius:11px;
  padding:14px;display:flex;align-items:center;justify-content:space-between}
.cat-name{font-size:12px;color:var(--text)}
.cat-del{width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:transparent;
  color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.cat-del:hover{border-color:var(--red);color:var(--red)}
.add-cat-row{display:flex;gap:9px}
.add-cat-row input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none}
.add-cat-row input:focus{border-color:var(--gold)}
.add-cat-row button{padding:10px 16px;background:var(--gold);border:none;border-radius:9px;
  color:#09090F;font-family:var(--fd);font-weight:700;font-size:12px;cursor:pointer}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ei{font-size:30px;margin-bottom:11px}
.empty p{font-size:11px;margin-top:5px}

/* ── BALANCE MODAL HINT ── */
.bal-hint{font-size:10px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>

<!-- ══ AUTH ══════════════════════════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-wordmark">Ledger<span>.</span></div>
    <div class="auth-tagline">Bank Transaction Tracker</div>
    <div class="tab-row">
      <button class="tab-btn on" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="field-name" class="field" style="display:none">
      <label>Full Name</label>
      <input type="text" id="inp-name" placeholder="Your name"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="you@email.com" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <button class="btn-gold" onclick="doAuth()" id="auth-btn">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- ══ APP ═══════════════════════════════════════════════════════════════ -->
<div id="app">
  <div class="shell">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sb-logo">Ledger<span>.</span></div>
      <div class="sb-user">
        <div class="sb-name" id="sb-name">—</div>
        <div class="sb-email" id="sb-email">—</div>
      </div>
      <div class="sb-nav">
        <div class="nav-item on" onclick="goPage('dashboard')" id="nav-dashboard"><span class="nav-icon">⬡</span> Dashboard</div>
        <div class="nav-item" onclick="goPage('transactions')" id="nav-transactions"><span class="nav-icon">↕</span> Transactions</div>
        <div class="nav-item" onclick="goPage('analytics')" id="nav-analytics"><span class="nav-icon">◎</span> Analytics</div>
        <div class="nav-item" onclick="goPage('categories')" id="nav-categories"><span class="nav-icon">❖</span> Categories</div>
      </div>
      <div class="sb-foot">
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main" id="main-area"></div>
  </div>
</div>

<!-- ══ MODAL ══════════════════════════════════════════════════════════════ -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Transaction</div>
    <div id="modal-body"></div>
    <div class="mfooter">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="modal-save-btn" onclick="modalSave()">Add</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const DEFAULT_CATS = ['Food','Transport','Bills','Shopping','Other'];
const BANKS = ['Meezan','Sadapay'];
const CAT_ICONS = {Food:'🍜',Transport:'🚗',Bills:'⚡',Shopping:'🛍️',Other:'📌'};
const COLORS = ['#C8A97E','#72C4A8','#C87E9A','#7E9AC8','#A8C87E','#C8C07E'];

let user = null;
let txns = [];
let cats = [...DEFAULT_CATS];
let balances = {Meezan:0,Sadapay:0};
let currentPage = 'dashboard';
let modalMode = null; // 'add' | 'edit' | 'balance'
let editId = null;
let selectedMonth = monthKey(new Date());
let chartInstances = {};

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmt(n){return'Rs. '+Number(n||0).toLocaleString('en-PK')}
function fmtDate(d){return new Date(d).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'})}
function monthKey(d){const dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')}
function monthLabel(k){const[y,m]=k.split('-');return new Date(y,m-1).toLocaleDateString('en-PK',{month:'short',year:'numeric'})}
function catIcon(c){return CAT_ICONS[c]||'📌'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function save(){
  localStorage.setItem('ldg_txns',JSON.stringify(txns));
  localStorage.setItem('ldg_cats',JSON.stringify(cats));
  localStorage.setItem('ldg_bal',JSON.stringify(balances));
}
function load(){
  txns=JSON.parse(localStorage.getItem('ldg_txns')||'[]');
  cats=JSON.parse(localStorage.getItem('ldg_cats')||JSON.stringify(DEFAULT_CATS));
  balances=JSON.parse(localStorage.getItem('ldg_bal')||'{"Meezan":0,"Sadapay":0}');
}

// ── AUTH ───────────────────────────────────────────────────────────────────
let authMode='login';
function switchTab(m){
  authMode=m;
  document.getElementById('tab-login').classList.toggle('on',m==='login');
  document.getElementById('tab-signup').classList.toggle('on',m==='signup');
  document.getElementById('field-name').style.display=m==='signup'?'block':'none';
  document.getElementById('auth-btn').textContent=m==='login'?'Sign In':'Create Account';
  document.getElementById('auth-err').textContent='';
}
function doAuth(){
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const name=document.getElementById('inp-name').value.trim();
  const err=document.getElementById('auth-err');
  if(!email||!pass){err.textContent='Please fill all fields.';return}
  const accounts=JSON.parse(localStorage.getItem('ldg_accounts')||'{}');
  if(authMode==='signup'){
    if(!name){err.textContent='Name is required.';return}
    if(accounts[email]){err.textContent='Account already exists.';return}
    accounts[email]={name,password:pass};
    localStorage.setItem('ldg_accounts',JSON.stringify(accounts));
    user={name,email};
  }else{
    if(!accounts[email]||accounts[email].password!==pass){err.textContent='Invalid email or password.';return}
    user={name:accounts[email].name,email};
  }
  localStorage.setItem('ldg_user',JSON.stringify(user));
  load();
  startApp();
}
function signOut(){
  user=null;localStorage.removeItem('ldg_user');
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function startApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-name').textContent=user.name;
  document.getElementById('sb-email').textContent=user.email;
  selectedMonth=monthKey(new Date());
  goPage('dashboard');
}
// Auto login
window.addEventListener('DOMContentLoaded',()=>{
  const u=JSON.parse(localStorage.getItem('ldg_user')||'null');
  if(u){user=u;load();startApp();}
});

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function goPage(p){
  currentPage=p;
  ['dashboard','transactions','analytics','categories'].forEach(id=>{
    document.getElementById('nav-'+id)?.classList.toggle('on',id===p);
  });
  // destroy old charts
  Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch{}});
  chartInstances={};
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('main-area');
  if(currentPage==='dashboard')el.innerHTML=renderDashboard();
  else if(currentPage==='transactions')el.innerHTML=renderTransactions();
  else if(currentPage==='analytics')el.innerHTML=renderAnalytics();
  else if(currentPage==='categories')el.innerHTML=renderCategories();
  if(currentPage==='analytics')initCharts();
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard(){
  const monthTxns=txns.filter(t=>monthKey(t.date)===selectedMonth);
  const monthTotal=monthTxns.reduce((s,t)=>s+t.amount,0);
  const lowBal=balances.Sadapay<5000;
  const recent=txns.slice(0,8);
  return`
  <div class="pg-title">Dashboard<span>.</span></div>
  ${lowBal?`<div class="warn-bar">⚠️ Sadapay balance is low — ${fmt(balances.Sadapay)}. Consider topping up.</div>`:''}
  <div class="g3">
    <div class="stat" style="cursor:pointer" onclick="openBalanceModal()">
      <div class="stat-lbl">Meezan Balance</div>
      <div class="stat-val gold">${fmt(balances.Meezan)}</div>
      <div class="stat-sub">Tap to update</div>
    </div>
    <div class="stat" style="cursor:pointer" onclick="openBalanceModal()">
      <div class="stat-lbl">Sadapay Balance</div>
      <div class="stat-val">${fmt(balances.Sadapay)}</div>
      <div class="stat-sub">Tap to update</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Spent This Month</div>
      <div class="stat-val">${fmt(monthTotal)}</div>
      <div class="stat-sub">${monthTxns.length} transactions</div>
    </div>
  </div>

  <div class="gmail-panel">
    <div class="gmail-icon">📧</div>
    <div class="gmail-body">
      <div class="gmail-title">Meezan Email Parser</div>
      <div class="gmail-sub">Paste your Meezan bank alert email text and click Parse — it'll auto-fill the transaction form for you.</div>
      <div class="gmail-actions">
        <button class="btn-sm" onclick="toggleGmailArea()">Paste Email</button>
        <button class="btn-sm teal" onclick="openAddModal()">+ Manual Entry</button>
      </div>
      <div id="gmail-area">
        <textarea id="gmail-txt" placeholder="Paste Meezan bank alert email text here... e.g. A debit of Rs. 2,500 has been made at Shell Petrol on your account..."></textarea>
        <button class="btn-sm" style="margin-top:7px" onclick="parseGmail()">Parse & Auto-fill →</button>
      </div>
    </div>
  </div>

  <div class="top-row">
    <div class="card-title" style="margin:0">Recent Transactions</div>
    <button class="btn-add" onclick="openAddModal()">+ Add Transaction</button>
  </div>
  <div class="tx-list">
    ${recent.length===0?`<div class="empty"><div class="ei">💳</div><div>No transactions yet.</div><p>Add your first one above.</p></div>`
    :recent.map(t=>txRow(t)).join('')}
  </div>`;
}

// ── TRANSACTIONS ───────────────────────────────────────────────────────────
function renderTransactions(){
  const search=(window._txSearch||'').toLowerCase();
  const fBank=window._txBank||'All';
  const fCat=window._txCat||'All';
  const filtered=txns.filter(t=>{
    return t.description.toLowerCase().includes(search)&&
      (fBank==='All'||t.bank===fBank)&&
      (fCat==='All'||t.category===fCat);
  });
  return`
  <div class="pg-title">Transactions<span>.</span></div>
  <div class="top-row">
    <div style="display:flex;gap:8px">
      <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
    </div>
    <button class="btn-add" onclick="openAddModal()">+ Add Transaction</button>
  </div>
  <div class="fbar">
    <input placeholder="🔍 Search transactions..." value="${window._txSearch||''}"
      oninput="window._txSearch=this.value;render()"/>
    <select onchange="window._txBank=this.value;render()">
      <option ${fBank==='All'?'selected':''}>All</option>
      ${BANKS.map(b=>`<option ${fBank===b?'selected':''}>${b}</option>`).join('')}
    </select>
    <select onchange="window._txCat=this.value;render()">
      <option ${fCat==='All'?'selected':''}>All</option>
      ${cats.map(c=>`<option ${fCat===c?'selected':''}>${c}</option>`).join('')}
    </select>
  </div>
  <div class="tx-list">
    ${filtered.length===0?`<div class="empty"><div class="ei">🔎</div><div>No transactions found.</div></div>`
    :filtered.map(t=>txRow(t)).join('')}
  </div>`;
}

function txRow(t){
  return`<div class="tx-item">
    <div class="tx-ico">${catIcon(t.category)}</div>
    <div class="tx-info">
      <div class="tx-desc">${t.description}</div>
      <div class="tx-meta">
        <span>${fmtDate(t.date)}</span>
        <span class="badge bdg-${t.bank.toLowerCase()}">${t.bank}</span>
        <span class="badge bdg-cat">${t.category}</span>
        ${t.notes?`<span style="color:var(--muted);font-size:10px">📝 ${t.notes}</span>`:''}
      </div>
    </div>
    <div class="tx-amt">−${fmt(t.amount)}</div>
    <div class="tx-btns">
      <button class="ico-btn" onclick="openEditModal('${t.id}')">✏️</button>
      <button class="ico-btn del" onclick="deleteTx('${t.id}')">🗑</button>
    </div>
  </div>`;
}

// ── ANALYTICS ──────────────────────────────────────────────────────────────
function renderAnalytics(){
  const months=getMonths();
  const monthTxns=txns.filter(t=>monthKey(t.date)===selectedMonth);
  const monthTotal=monthTxns.reduce((s,t)=>s+t.amount,0);
  const catMap={};
  monthTxns.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});
  const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0];

  // Bank split
  const bankSplit=BANKS.map(b=>{
    const bt=monthTxns.filter(t=>t.bank===b);
    const tot=bt.reduce((s,t)=>s+t.amount,0);
    return`<div class="card">
      <div class="card-title">${b} — ${monthLabel(selectedMonth)}</div>
      <div style="margin-bottom:12px">
        <span class="stat-val" style="font-size:20px">${fmt(tot)}</span>
        <span style="margin-left:9px;font-size:11px;color:var(--muted)">${bt.length} txns</span>
      </div>
      <div class="tx-list">
        ${bt.length===0?`<div style="color:var(--muted);font-size:11px;text-align:center;padding:14px 0">No transactions</div>`
        :bt.slice(0,5).map(t=>`<div class="tx-item" style="padding:9px 11px">
          <div class="tx-ico" style="width:30px;height:30px;font-size:13px">${catIcon(t.category)}</div>
          <div class="tx-info"><div class="tx-desc" style="font-size:12px">${t.description}</div>
          <div class="tx-meta">${fmtDate(t.date)}</div></div>
          <div class="tx-amt" style="font-size:13px">−${fmt(t.amount)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  return`
  <div class="pg-title">Analytics<span>.</span></div>
  <div class="month-row">
    ${months.map(m=>`<button class="m-btn ${m===selectedMonth?'on':''}" onclick="selectedMonth='${m}';render()">${monthLabel(m)}</button>`).join('')}
  </div>
  <div class="g2">
    <div class="stat">
      <div class="stat-lbl">Total Spent — ${monthLabel(selectedMonth)}</div>
      <div class="stat-val gold">${fmt(monthTotal)}</div>
      <div class="stat-sub">${monthTxns.length} transactions</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Top Category</div>
      <div class="stat-val">${topCat?topCat[0]:'—'}</div>
      <div class="stat-sub">${topCat?fmt(topCat[1]):'No data'}</div>
    </div>
  </div>
  ${monthTxns.length===0?`<div class="empty card"><div class="ei">📊</div><div>No transactions for this month.</div></div>`:`
  <div class="charts-g">
    <div class="card"><div class="card-title">By Category</div><canvas id="chart-cat" height="220"></canvas></div>
    <div class="card"><div class="card-title">By Bank</div><canvas id="chart-bank" height="220"></canvas></div>
  </div>`}
  <div class="g2">${bankSplit}</div>`;
}

function getMonths(){
  const keys=[...new Set(txns.map(t=>monthKey(t.date)))].sort().reverse();
  const cur=monthKey(new Date());
  if(!keys.includes(cur))keys.unshift(cur);
  return keys;
}

function initCharts(){
  const monthTxns=txns.filter(t=>monthKey(t.date)===selectedMonth);
  if(monthTxns.length===0)return;
  const catMap={};
  monthTxns.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});
  const catLabels=Object.keys(catMap);
  const catVals=Object.values(catMap);

  const bankData=BANKS.map(b=>monthTxns.filter(t=>t.bank===b).reduce((s,t)=>s+t.amount,0));

  const cfgBase={responsive:true,plugins:{legend:{labels:{color:'#7A7888',font:{family:"'DM Mono',monospace",size:11}}}}};

  const c1=document.getElementById('chart-cat');
  if(c1){
    chartInstances.cat=new Chart(c1,{type:'doughnut',data:{
      labels:catLabels,
      datasets:[{data:catVals,backgroundColor:COLORS,borderWidth:0,hoverOffset:6}]
    },options:{...cfgBase,cutout:'62%',plugins:{...cfgBase.plugins,
      tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed)},bodyFont:{family:"'DM Mono'"},backgroundColor:'#111119',borderColor:'rgba(255,255,255,.07)',borderWidth:1}
    }}});
  }
  const c2=document.getElementById('chart-bank');
  if(c2){
    chartInstances.bank=new Chart(c2,{type:'bar',data:{
      labels:BANKS,
      datasets:[{data:bankData,backgroundColor:['#C8A97E','#72C4A8'],borderRadius:7,borderSkipped:false}]
    },options:{...cfgBase,scales:{
      x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#7A7888',font:{family:"'DM Mono'",size:11}}},
      y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#7A7888',font:{family:"'DM Mono'",size:10},callback:v=>v>=1000?(v/1000)+'k':v}}
    },plugins:{...cfgBase.plugins,
      tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed.y)},bodyFont:{family:"'DM Mono'"},backgroundColor:'#111119',borderColor:'rgba(255,255,255,.07)',borderWidth:1}
    }}});
  }
}

// ── CATEGORIES ─────────────────────────────────────────────────────────────
function renderCategories(){
  return`
  <div class="pg-title">Categories<span>.</span></div>
  <div class="card">
    <div class="card-title">Manage Categories</div>
    <div class="cat-grid">
      ${cats.map(c=>`<div class="cat-card">
        <div style="display:flex;align-items:center;gap:8px">
          <span>${catIcon(c)}</span><span class="cat-name">${c}</span>
        </div>
        ${DEFAULT_CATS.includes(c)?'':`<button class="cat-del" onclick="deleteCat('${c}')">✕</button>`}
      </div>`).join('')}
    </div>
    <div class="add-cat-row" style="margin-top:16px">
      <input id="new-cat-inp" placeholder="New category name..." onkeydown="if(event.key==='Enter')addCat()"/>
      <button onclick="addCat()">Add</button>
    </div>
  </div>`;
}
function addCat(){
  const v=document.getElementById('new-cat-inp')?.value.trim();
  if(v&&!cats.includes(v)){cats.push(v);save();render();}
}
function deleteCat(c){
  cats=cats.filter(x=>x!==c);save();render();
}

// ── MODALS ─────────────────────────────────────────────────────────────────
function openModal(){document.getElementById('modal-overlay').classList.add('show')}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');modalMode=null;editId=null}

function buildTxForm(prefill={}){
  const today=new Date().toISOString().slice(0,10);
  return`
  <div class="field"><label>Description</label>
    <input type="text" id="f-desc" placeholder="e.g. Grocery at Carrefour" value="${prefill.description||''}"/></div>
  <div class="g2">
    <div class="field"><label>Amount (Rs.)</label>
      <input type="number" id="f-amt" placeholder="0" value="${prefill.amount||''}"/></div>
    <div class="field"><label>Date</label>
      <input type="date" id="f-date" value="${prefill.date?prefill.date.slice(0,10):today}"/></div>
  </div>
  <div class="g2">
    <div class="field"><label>Bank</label>
      <select id="f-bank">
        ${BANKS.map(b=>`<option ${(prefill.bank||'Meezan')===b?'selected':''}>${b}</option>`).join('')}
      </select></div>
    <div class="field"><label>Category</label>
      <select id="f-cat">
        ${cats.map(c=>`<option ${(prefill.category||cats[0])===c?'selected':''}>${c}</option>`).join('')}
      </select></div>
  </div>
  <div class="field"><label>Notes (optional)</label>
    <textarea id="f-notes" placeholder="Any additional notes...">${prefill.notes||''}</textarea></div>`;
}

function openAddModal(prefill={}){
  modalMode='add';editId=null;
  document.getElementById('modal-title').textContent='Add Transaction';
  document.getElementById('modal-save-btn').textContent='Add';
  document.getElementById('modal-body').innerHTML=buildTxForm(prefill);
  openModal();
}
function openEditModal(id){
  const t=txns.find(x=>x.id===id);if(!t)return;
  modalMode='edit';editId=id;
  document.getElementById('modal-title').textContent='Edit Transaction';
  document.getElementById('modal-save-btn').textContent='Save Changes';
  document.getElementById('modal-body').innerHTML=buildTxForm(t);
  openModal();
}
function openBalanceModal(){
  modalMode='balance';editId=null;
  document.getElementById('modal-title').textContent='Update Balances';
  document.getElementById('modal-save-btn').textContent='Save';
  document.getElementById('modal-body').innerHTML=`
    ${BANKS.map(b=>`<div class="field"><label>${b} Balance (Rs.)</label>
      <input type="number" id="bal-${b}" value="${balances[b]||0}"/>
      <div class="bal-hint">Current: ${fmt(balances[b])}</div></div>`).join('')}`;
  openModal();
}

function modalSave(){
  if(modalMode==='balance'){
    BANKS.forEach(b=>{balances[b]=parseFloat(document.getElementById('bal-'+b)?.value)||0;});
    save();closeModal();render();return;
  }
  const desc=document.getElementById('f-desc')?.value.trim();
  const amt=parseFloat(document.getElementById('f-amt')?.value);
  const date=document.getElementById('f-date')?.value;
  const bank=document.getElementById('f-bank')?.value;
  const category=document.getElementById('f-cat')?.value;
  const notes=document.getElementById('f-notes')?.value.trim();
  if(!desc||!amt)return;
  if(modalMode==='add'){
    txns.unshift({id:uid(),description:desc,amount:amt,date:new Date(date).toISOString(),bank,category,notes});
    balances[bank]=Math.max(0,(balances[bank]||0)-amt);
  }else if(modalMode==='edit'){
    const i=txns.findIndex(t=>t.id===editId);
    if(i>-1)txns[i]={...txns[i],description:desc,amount:amt,date:new Date(date).toISOString(),bank,category,notes};
  }
  save();closeModal();render();
}

function deleteTx(id){
  const t=txns.find(x=>x.id===id);
  if(t)balances[t.bank]=(balances[t.bank]||0)+t.amount;
  txns=txns.filter(x=>x.id!==id);
  save();render();
}

// ── GMAIL PARSER ───────────────────────────────────────────────────────────
function toggleGmailArea(){
  const el=document.getElementById('gmail-area');
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
function parseGmail(){
  const raw=document.getElementById('gmail-txt')?.value||'';
  const amtMatch=raw.match(/(?:Rs\.?|PKR)\s*([\d,]+)/i);
  const descMatch=raw.match(/(?:at|to|for)\s+([A-Za-z0-9 &'-]+?)(?:\s+on|\s+dated|\s+from|\.|\n|$)/i);
  const amt=amtMatch?parseFloat(amtMatch[1].replace(/,/g,'')):null;
  const desc=descMatch?descMatch[1].trim():'Meezan Transaction';
  if(amt){
    document.getElementById('gmail-area').style.display='none';
    openAddModal({amount:amt,description:desc,bank:'Meezan',category:'Other'});
  }else{
    alert('Could not detect an amount in this email. Please add the transaction manually.');
  }
}

// ── EXPORT CSV ─────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Date','Description','Amount (Rs.)','Category','Bank','Notes'],
    ...txns.map(t=>[fmtDate(t.date),t.description,t.amount,t.category,t.bank,t.notes||''])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ledger-transactions.csv';a.click();
}
</script>
